apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfleet-demo
  namespace: kfleet-demo
  labels:
    app.kubernetes.io/name: kfleet-demo
    app.kubernetes.io/part-of: kfleet
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kfleet-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kfleet-demo
        app.kubernetes.io/part-of: kfleet
    spec:
      serviceAccountName: kfleet-demo
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hub
          image: ghcr.io/1solomonwakhungu/kfleet-public-demo:main
          imagePullPolicy: Always
          env:
            - name: KFLEET_DEMO_MODE
              value: "true"
            - name: KFLEET_LISTEN_ADDR
              value: ":8080"
            - name: KFLEET_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

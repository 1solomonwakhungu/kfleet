replicaCount: 1

image:
  repository: ghcr.io/1solomonwakhungu/kfleet-hub
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  nodePort: ""
  annotations: {}

persistence:
  enabled: true
  size: 1Gi
  mountPath: /data
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kfleet.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: false
    secretName: ""
    hosts: []

registration:
  token: ""

auth:
  sessionDuration: 24h
  # Keep false when the hub is served over HTTPS. Set true only for a local
  # plain-HTTP environment such as the kind quickstart.
  sessionCookieInsecure: false
  bootstrapAdmin:
    # These values create the first admin only when the database has no users.
    # Supply all three together. Prefer a protected values file or secret
    # management integration instead of command-line values in production.
    username: ""
    email: ""
    password: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# The hub currently does not call the Kubernetes API. This switch is reserved
# for installations that add API-backed hub integrations.
rbac:
  create: false

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
